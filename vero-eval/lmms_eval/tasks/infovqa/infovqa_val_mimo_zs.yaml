dataset_path: lmms-lab/DocVQA
dataset_name: InfographicVQA
dataset_kwargs:
  token: True
task: "infovqa_val_mimo_zs"
test_split: validation
output_type: generate_until
doc_to_target: "answers"
doc_to_visual: !function utils.infovqa_doc_to_visual
doc_to_text: !function utils.infovqa_doc_to_text
process_results: !function utils.infovqa_zs_process_results
generation_kwargs:
  max_new_tokens: 32768
  temperature: 0
  do_sample: false
filter_list:
  - name: "flexible-extract"
    filter:
      - function: !function utils.BoxedFilter
lmms_eval_specific_kwargs:
  default:
    pre_prompt: ""
    post_prompt: "\nPut your final answer in \\boxed{}. Try to answer using the content in the image as much as possible."
metric_list:
  - metric: anls
    aggregation: mean
    higher_is_better: true
