dataset_path: Jayant-Sravan/CountQA
process_docs: !function utils.countqa_process_docs
task: "countqa_reasoning"
test_split: test
output_type: generate_until
doc_to_visual: !function utils.countqa_doc_to_visual
doc_to_text: !function utils.countqa_doc_to_text
doc_to_target: !function utils.countqa_doc_to_target

generation_kwargs:
  max_new_tokens: 16384
  temperature: 0.6
  do_sample: True


process_results: !function utils.countqa_cot_process_results
metric_list:
  - metric: exact_match
    aggregation: mean
    higher_is_better: true

lmms_eval_specific_kwargs:
  default:
    pre_prompt: ""
    post_prompt: ""

metadata:
  version: 0.0