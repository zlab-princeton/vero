task: "mmmu_pro_vision_qwen3_zs"
dataset_path: MMMU/MMMU_Pro
dataset_name: vision
test_split: test
output_type: generate_until
doc_to_visual: !function utils.mmmu_pro_doc_to_visual
doc_to_text: "Please answer with the option letter from the given choices."
doc_to_target: "{{answer}}"
# The return value of process_results will be used by metrics
process_results: !function utils.mmmu_pro_process_results

metric_list:
  - metric: mmmu_acc
    aggregation: !function utils.mmmu_pro_aggregate_results
    higher_is_better: true

include: _default_template_yaml

generation_kwargs:
  max_new_tokens: 16384


  temperature: 1.0
  top_p: 1.0
  top_k: 40
  presence_penalty: 2.0
  do_sample: True
