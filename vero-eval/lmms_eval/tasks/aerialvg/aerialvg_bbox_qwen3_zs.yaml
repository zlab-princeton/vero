include: aerialvg_bbox.yaml
task: "aerialvg_bbox_qwen3_zs"
process_docs: !function utils.aerialvg_process_docs_rel1000
doc_to_text: !function utils.aerialvg_doc_to_text_rel1000
generation_kwargs:
  max_new_tokens: 16384
  temperature: 1.0
  top_p: 1.0
  top_k: 40
  presence_penalty: 2.0
  do_sample: True
lmms_eval_specific_kwargs:
  default:
    pre_prompt: ""
    post_prompt: ' Return only one JSON array with a single object: [{"bbox_2d": [x_min, y_min, x_max, y_max], "label": "<class name>"}]. Use coordinates scaled to 1000 (range 0-1000) relative to the image (origin at top-left; x_min,y_min upper-left, x_max,y_max lower-right). Provide exactly one box with no extra text.'