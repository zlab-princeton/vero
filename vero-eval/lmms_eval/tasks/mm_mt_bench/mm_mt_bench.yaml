dataset_path: mistralai/MM-MT-Bench
dataset_kwargs:
  token: True
task: "mm_mt_bench"
test_split: eval
process_docs: !function utils.mm_mt_bench_process_docs
doc_to_messages: !function utils.mm_mt_bench_doc_to_messages
doc_to_visual: !function utils.mm_mt_bench_doc_to_visual
doc_to_text: !function utils.mm_mt_bench_doc_to_text
doc_to_target: ""
process_results: !function utils.mm_mt_bench_process_results
metric_list:
  - metric: micro_average_score
    aggregation: !function utils.mm_mt_bench_aggregate_micro
    higher_is_better: true
  - metric: macro_average_score
    aggregation: !function utils.mm_mt_bench_aggregate_macro_category
    higher_is_better: true

lmms_eval_specific_kwargs:
  default:
    pre_prompt: ""
    post_prompt: ""

generation_kwargs:
  max_new_tokens: 4096
metadata:
  version: 0.0
  task_type: image
  gpt_eval_model_name: "gpt-4o-2024-05-13"
