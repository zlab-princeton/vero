dataset_path: whyu/mm-vet-v2
dataset_kwargs:
  token: true
task: mmvetv2_group_img_reasoning_samplingq3
test_split: test
output_type: generate_until
doc_to_visual: !function utils.mmvet_group_img_doc_to_visual
doc_to_text: !function utils.doc_to_text
doc_to_target: "{{answer}}"
generation_kwargs:
  max_new_tokens: 16384
  temperature: 1.0
  top_p: 0.95
  top_k: 20
  presence_penalty: 1.5
  do_sample: true
process_results: !function utils.mmvet_process_results
metric_list:
  - metric: gpt_eval_score
    aggregation: !function utils.mmvet_aggregate_results
    higher_is_better: true
metadata:
  version: 0.0
  interleaved_format: false
lmms_eval_specific_kwargs:
  default:
    pre_prompt: ""
    post_prompt: ""
