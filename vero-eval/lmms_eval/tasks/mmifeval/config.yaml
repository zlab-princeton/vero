dataset_path: lscpku/MMIFEval
dataset_kwargs:
  token: True
task: "mmifeval"
test_split: test
doc_to_visual: !function utils.mmifeval_doc_to_visual
doc_to_text: !function utils.mmifeval_doc_to_text
doc_to_target: ""
process_results: !function utils.mmifeval_process_results
metric_list:
  - metric: mmifeval_overall_accuracy
    aggregation: !function utils.mmifeval_aggregate_overall
    higher_is_better: true
  - metric: mmifeval_p_level_accuracy
    aggregation: !function utils.mmifeval_aggregate_p_level
    higher_is_better: true
  - metric: mmifeval_c_level_accuracy
    aggregation: !function utils.mmifeval_aggregate_c_level
    higher_is_better: true

lmms_eval_specific_kwargs:
  default:
    pre_prompt: ""
    post_prompt: ""

generation_kwargs:
  max_new_tokens: 512

metadata:
  version: 0.0
  task_type: image
  gpt_eval_model_name: "gpt-4o-2024-11-20"
