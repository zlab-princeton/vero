dataset_path: lmms-lab/vstar-bench
task: "vstar_bench_mimo_zs"
test_split: test
output_type: generate_until
doc_to_visual: !function mimo_utils.vstar_doc_to_visual
doc_to_text: !function mimo_utils.vstar_doc_to_text
doc_to_target: "label"
generation_kwargs:
  max_new_tokens: 32768
  temperature: 0.0
  do_sample: false
process_results: !function mimo_utils.vstar_bench_mimo_process_results

filter_list:
  - name: "flexible-extract"
    filter:
      - function: !function mimo_utils.BoxedFilter

metric_list:
  - metric: accuracy
    aggregation: !function mimo_utils.vstar_bench_mimo_aggregate_results
    higher_is_better: true

lmms_eval_specific_kwargs:
  default:
    pre_prompt: ""
    post_prompt: "\nPut your final answer in \\boxed{}."

metadata:
  version: 0.0
