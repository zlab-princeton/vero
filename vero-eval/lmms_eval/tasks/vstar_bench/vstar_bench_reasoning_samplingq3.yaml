include: _default_template_yaml
task: "vstar_bench_reasoning_samplingq3"
generation_kwargs:
  max_new_tokens: 16384


  temperature: 1.0
  top_p: 0.95
  top_k: 20
  presence_penalty: 1.5
  do_sample: True

lmms_eval_specific_kwargs:
  default:
    pre_prompt: ""
    post_prompt: ""
    strip_answer_instruction: true
metric_list:
  - metric: vstar_overall_acc
    aggregation: !function utils.vstar_aggregate_results
    higher_is_better: true
