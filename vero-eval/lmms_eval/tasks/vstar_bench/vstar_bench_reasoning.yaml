include: _default_template_yaml
task: "vstar_bench_reasoning"
generation_kwargs:
  max_new_tokens: 16384
  temperature: 0.6
  do_sample: True

lmms_eval_specific_kwargs:
  default:
    pre_prompt: ""
    post_prompt: ""
    strip_answer_instruction: true
metric_list:
  - metric: vstar_overall_acc
    aggregation: !function utils.vstar_aggregate_results
    higher_is_better: true
