dataset_path: yifanzhang114/MME-RealWorld-lite-lmms-eval
dataset_kwargs:
  token: True
  # From_YouTube: True
task: mme_realworld_lite_reasoning
test_split: train
output_type: generate_until
doc_to_visual: !function utils.mme_realworld_doc_to_visual
doc_to_text: !function utils.mme_realworld_doc_to_text_cot
doc_to_target: "answer"
generation_kwargs:
  max_new_tokens: 16384
  temperature: 0.6
  do_sample: True

# The return value of process_results will be used by metrics
process_results: !function utils.mme_realworld_process_results
# Note that the metric name can be either a registed metric function (such as the case for GQA) or a key name returned by process_results
metric_list:
  - metric: mme_realworld_score
    aggregation: !function utils.mme_realworld_aggregate_results
    higher_is_better: true
metadata:
  - version: 0.0

lmms_eval_specific_kwargs:
  default:
    pre_prompt: ""
    post_prompt: "\nSelect the best answer to the above multiple-choice question based on the image."